<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shopping" />
    <title>Shopping List</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css?v=50" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Smart Add</p>
          <h1 data-i18n="heading">Shopping</h1>
        </div>
        <div class="top-actions">
          <label class="language-select" for="languageSelect">
            <span data-i18n="language">Language</span>
            <select id="languageSelect" aria-label="Language">
              <option value="en" data-i18n="english" selected>En</option>
              <option value="it" data-i18n="italian">It</option>
              <option value="de" data-i18n="german">De</option>
              <option value="fr" data-i18n="french">Fr</option>
            </select>
          </label>
          <button class="icon-button" id="settingsButton" type="button" aria-label="Open settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.05.05a2.05 2.05 0 0 1-2.9 2.9l-.05-.05A1.7 1.7 0 0 0 15 19.43a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.08a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.88.34l-.05.05a2.05 2.05 0 0 1-2.9-2.9l.05-.05A1.7 1.7 0 0 0 4.57 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.08a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.88l-.05-.05a2.05 2.05 0 0 1 2.9-2.9l.05.05A1.7 1.7 0 0 0 9 4.57a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.08a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.88-.34l.05-.05a2.05 2.05 0 0 1 2.9 2.9l-.05.05A1.7 1.7 0 0 0 19.43 9c.22.6.8 1 1.55 1H21a2 2 0 0 1 0 4h-.08a1.7 1.7 0 0 0-1.55 1Z" />
            </svg>
          </button>
        </div>
      </header>

      <section class="summary-band" aria-label="Shopping progress">
        <div>
          <span id="tripLabel">Weekly Groceries</span>
          <span id="storeLabel">Any grocery store</span>
          <strong id="progressText">0 of 0 bought</strong>
        </div>
        <div class="supermarket-list" id="supermarketList" aria-label="Supermarkets"></div>
        <div class="progress-track">
          <span id="progressBar"></span>
        </div>
      </section>

      <section class="quick-add" aria-label="Add shopping items" data-i18n-aria-label="addShoppingItems">
        <label for="itemInput" data-i18n="addItems">Add items</label>
        <div class="input-row">
          <input id="itemInput" autocomplete="off" placeholder="milk, bananas, eggs" />
          <button class="icon-button" id="voiceButton" type="button" aria-label="Use voice input">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z" />
              <path d="M19 11a7 7 0 0 1-14 0" />
              <path d="M12 18v3" />
              <path d="M8 21h8" />
            </svg>
          </button>
          <button class="primary-icon" id="addButton" type="button" aria-label="Add items">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
          </button>
        </div>
        <label class="suggestion-label" for="suggestionCategorySelect">
          <span data-i18n="category">Category</span>
          <select id="suggestionCategorySelect">
            <option value="Fruits">Fruits</option>
            <option value="Vegetables">Vegetables</option>
            <option value="Dairy">Dairy</option>
            <option value="Drinks">Drinks</option>
            <option value="Pantry">Pantry</option>
            <option value="Household">Household</option>
            <option value="Petrol and Gas">Petrol and Gas</option>
            <option value="Extra">Extra</option>
          </select>
        </label>
        <label class="suggestion-label" for="quickItemSelect">
          <span data-i18n="items">Item</span>
          <select id="quickItemSelect" aria-label="Quick item suggestions"></select>
        </label>
      </section>

      <section class="reminder-panel" aria-label="Reminder settings">
        <div class="row-title">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z" />
            <path d="M10 21h4" />
          </svg>
          <div>
            <strong data-i18n="remindMe">Remind me</strong>
            <span id="reminderSummary">June 14 at 5:30 PM</span>
          </div>
        </div>
        <label class="switch">
          <input id="reminderToggle" type="checkbox" checked />
          <span></span>
        </label>
      </section>

      <section class="list-area" aria-label="Shopping list">
        <div class="section-heading">
          <h2 data-i18n="items">Items</h2>
        </div>
        <div class="button-row" aria-label="Shopping list actions">
          <button id="smsButton" type="button">SMS</button>
          <button id="emailButton" type="button" data-i18n="email">Email</button>
          <button id="clearDoneButton" type="button" data-i18n="clearDone">Clear Done</button>
        </div>
        <div id="categoryList" class="category-list"></div>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="sheet">
        <div class="sheet-handle"></div>
        <header>
          <h2 data-i18n="tripSettings">Trip Settings</h2>
          <button class="icon-button" value="close" type="submit" aria-label="Close settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </header>
        <label>
          <span data-i18n="listName">List name</span>
          <input id="listNameInput" type="text" value="Weekly Groceries" />
        </label>
        <label>
          <span data-i18n="supermarket">Supermarket</span>
          <select id="storeSelect">
            <option value="Lidl">Lidl</option>
            <option value="Aldi">Aldi</option>
            <option value="Migros">Migros</option>
            <option value="Coop">Coop</option>
            <option value="Denner">Denner</option>
            <option value="Lidl-DE">Lidl-DE</option>
            <option value="Asian Store">Asian Store</option>
            <option value="Turkish Store">Turkish Store</option>
            <option value="NP-Store-BE">NP-Store-BE</option>
            <option value="Volg">Volg</option>
            <option value="Agip">Agip</option>
          </select>
        </label>
        <label>
          <span data-i18n="measurementSystem">Measurement system</span>
          <select id="measurementSystemSelect">
            <option value="eu" data-i18n="european">European</option>
            <option value="us" data-i18n="us">US</option>
          </select>
        </label>
        <label>
          <span data-i18n="reminderMonth">Reminder month</span>
          <select id="reminderMonthSelect"></select>
        </label>
        <label>
          <span data-i18n="reminderDay">Reminder day</span>
          <select id="reminderDaySelect"></select>
        </label>
        <label>
          <span data-i18n="reminderTime">Reminder time</span>
          <input id="reminderTimeInput" type="time" value="17:30" />
        </label>
        <button class="wide-button" id="saveSettingsButton" value="close" type="submit" data-i18n="saveSettings">Save Settings</button>
      </form>
    </dialog>

    <template id="categoryTemplate">
      <article class="category">
        <button class="category-header" type="button">
          <span></span>
          <small></small>
        </button>
        <div class="items"></div>
      </article>
    </template>

    <template id="itemTemplate">
      <div class="item-row">
        <button class="check-button" type="button" aria-label="Toggle bought">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m5 12 5 5L20 7" />
          </svg>
        </button>
        <div class="item-main">
          <div class="item-title">
            <strong></strong>
            <input class="comment-toggle" type="checkbox" aria-label="Show item comment" />
          </div>
          <input class="item-comment-input" type="text" aria-label="Item comment" placeholder="Write comment" />
        </div>
        <div class="item-amount">
          <input class="row-quantity-input" inputmode="decimal" type="text" aria-label="Item quantity" />
          <select class="row-unit-select" aria-label="Item unit"></select>
        </div>
        <button class="icon-button delete-button" type="button" aria-label="Delete item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="m19 6-1 14H6L5 6" />
            <path d="M10 11v5" />
            <path d="M14 11v5" />
          </svg>
        </button>
      </div>
    </template>

    <script src="app.js?v=51"></script>
  </body>
</html>
